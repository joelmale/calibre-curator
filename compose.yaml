name: calibre-curator

networks:
  homelab-net:
    external: true

volumes:
  calibre_web_config:
  ai_sidecar_state:

services:
  calibre-web:
    build:
      context: ./calibre-web-fork
      dockerfile: Dockerfile
    container_name: calibre-web
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - DOCKER_MODS=linuxserver/mods:universal-calibre
      - AI_SIDECAR_ENABLED=true
      - AI_SIDECAR_BASE_URL=http://calibre-ai-sidecar:8090
      - AI_SIDECAR_SHARED_TOKEN=${AI_SIDECAR_SHARED_TOKEN}
    volumes:
      - calibre_web_config:/config
      - /mnt/books-nas-vol3/calibre:/books
    ports:
      - "8083:8083"
    networks:
      - homelab-net

  ai-sidecar:
    build:
      context: ./ai-sidecar
      dockerfile: Dockerfile
    container_name: calibre-ai-sidecar
    restart: unless-stopped
    environment:
      - TZ=America/New_York
      - APP_ENV=production
      - LISTEN_HOST=0.0.0.0
      - LISTEN_PORT=8090
      - CALIBRE_LIBRARY_ROOT=/calibre-library
      - CALIBRE_METADATA_DB=/calibre-library/metadata.db
      - SIDECAR_DB_PATH=/state/ai_sidecar.sqlite3
      - VECTOR_BACKEND=chroma
      - CHROMA_PERSIST_DIR=/state/chroma
      - EMBEDDING_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      - OLLAMA_CHAT_MODEL=llama3.2:3b
      - AI_SIDECAR_SHARED_TOKEN=${AI_SIDECAR_SHARED_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_EMBED_MODEL=text-embedding-3-small
      - SCAN_INTERVAL_SECONDS=300
      - MAX_EXTRACTED_CHARS_PER_BOOK=120000
      - LOG_LEVEL=INFO
    volumes:
      - /mnt/books-nas-vol3/calibre:/calibre-library:ro
      - ai_sidecar_state:/state
    expose:
      - "8090"
    networks:
      - homelab-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
