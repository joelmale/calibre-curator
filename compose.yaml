name: calibre-curator

networks:
  homelab-net:
    external: true

volumes:
  calibre_web_config:
  ai_sidecar_state:
  cwa_book_ingest:
  editor_scratch:

services:
  calibre-web-automate:
    build:
      context: ./cwa-fork
      dockerfile: Dockerfile
    container_name: calibre-web
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      # DOCKER_MODS=linuxserver/mods:universal-calibre removed — CWA bundles Calibre at /app/calibre
      - AI_SIDECAR_ENABLED=true
      - AI_SIDECAR_BASE_URL=http://calibre-ai-sidecar:8090
      - AI_SIDECAR_SHARED_TOKEN=${AI_SIDECAR_SHARED_TOKEN}
      # /mnt/books-nas-vol3 is an NFS/SMB share — NETWORK_SHARE_MODE disables SQLite
      # WAL mode to prevent metadata.db corruption over the network filesystem.
      - NETWORK_SHARE_MODE=true
    volumes:
      - calibre_web_config:/config
      - /mnt/books-nas-vol3/calibre:/calibre-library
      - cwa_book_ingest:/cwa-book-ingest
    ports:
      - "8083:8083"
    networks:
      - homelab-net

  ai-sidecar:
    build:
      context: ./ai-sidecar
      dockerfile: Dockerfile
    container_name: calibre-ai-sidecar
    restart: unless-stopped
    environment:
      - TZ=America/New_York
      - APP_ENV=production
      - LISTEN_HOST=0.0.0.0
      - LISTEN_PORT=8090
      - CALIBRE_LIBRARY_ROOT=/calibre-library
      - CALIBRE_METADATA_DB=/calibre-library/metadata.db
      - SIDECAR_DB_PATH=/state/ai_sidecar.sqlite3
      - VECTOR_BACKEND=chroma
      - CHROMA_PERSIST_DIR=/state/chroma
      - EMBEDDING_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      - OLLAMA_CHAT_MODEL=llama3.2:latest
      - AI_SIDECAR_SHARED_TOKEN=${AI_SIDECAR_SHARED_TOKEN}
      # ── Chat / generation provider fallback chain ──────────────────────────
      # First provider with a key wins; local Ollama is always the final floor.
      - CHAT_PROVIDER_PRIORITY=gemini,anthropic,openai,grok,meta,ollama
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_EMBED_MODEL=text-embedding-3-small
      - OPENAI_CHAT_MODEL=gpt-4o-mini
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_CHAT_MODEL=claude-haiku-4-5
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_CHAT_MODEL=gemini-2.0-flash
      - XAI_API_KEY=${XAI_API_KEY:-}
      - XAI_BASE_URL=https://api.x.ai/v1
      - XAI_CHAT_MODEL=grok-3
      - META_API_KEY=${META_API_KEY:-}
      - META_BASE_URL=https://api.llama.com/compat/v1
      - META_CHAT_MODEL=Llama-4-Maverick-17B-128E-Instruct-FP8
      - SCAN_INTERVAL_SECONDS=300
      - MAX_EXTRACTED_CHARS_PER_BOOK=120000
      - LOG_LEVEL=INFO
    volumes:
      - /mnt/books-nas-vol3/calibre:/calibre-library:ro
      - ai_sidecar_state:/state
    expose:
      - "8090"
    networks:
      - homelab-net
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:8090/healthz" ]
      interval: 30s
      timeout: 5s
      retries: 5

  cwa-editor:
    build:
      context: ./cwa-editor
      dockerfile: Dockerfile
    container_name: calibre-web-editor
    restart: unless-stopped
    environment:
      - TZ=America/New_York
      - CALIBRE_LIBRARY_ROOT=/calibre-library
      - EDITOR_SCRATCH_DIR=/state/editor_scratch
    volumes:
      - /mnt/books-nas-vol3/calibre:/calibre-library
      - editor_scratch:/state/editor_scratch
    expose:
      - "8091"
    networks:
      - homelab-net
