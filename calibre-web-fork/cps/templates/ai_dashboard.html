{% extends "layout.html" %}

{% block header %}
<link rel="stylesheet" href="{{ url_for('static', filename='ai/ai-dashboard.css') }}">
<meta name="csrf-token" content="{{ csrf_token() }}">
{% endblock %}

{% block body %}
{% if current_user.role_admin() %}
<div style="text-align:right;margin-bottom:8px">
  <a href="{{ url_for('ai_bridge.scrub_index') }}" class="btn btn-default btn-xs">
    &#10005; Format Scrub
  </a>
</div>
{% endif %}
<div id="ai-curation-root"
     data-api-base="{{ url_for('ai_bridge.proxy_api', subpath='') }}">
  <noscript>
    <div class="alert alert-warning">
      AI Curation requires JavaScript to be enabled.
    </div>
  </noscript>
</div>
{% endblock %}

{% block js %}
{{ super() }}
<script type="module" src="{{ url_for('static', filename='ai/ai-dashboard.js') }}"></script>
{% endblock %}
